# Python to Linux Web App on Azure
# Build your Python project and deploy it to Azure as a Linux Web App.
# Change python version to one thats appropriate for your application.
# https://docs.microsoft.com/azure/devops/pipelines/languages/python

trigger:
- none

variables:
  # Azure Resource Manager connection created during pipeline creation
  azureServiceConnectionId: '12d03d7f-9011-4de2-b31a-ab4a4d8aab8a'

  # Web app name
  webAppName: 'myflaskapp'

  # Agent VM image name
  #vmImageName: 'ubuntu-latest'

  # Environment name
  environmentName: 'dev'

  # Project root folder. Point to the folder containing manage.py file.
  projectRoot: $(System.DefaultWorkingDirectory)

  pythonVersion: '3.13.5'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    pool:
      name: Default
    steps:

    - script: |
        python3 -m venv antenv
        source antenv/bin/activate
        python3 -m pip install --upgrade pip
        pip3 install setup
        pip3 install -r requirements.txt
      workingDirectory: $(projectRoot)
      displayName: "Install requirements"

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(projectRoot)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload package'
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Web App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    pool:
      name: Default
    environment: $(environmentName)
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "creating deployment directory and setting permissions"
              mkdir -p /home/azureuser/dist
              sudo chown -R $USER:$USER /home/azureuser/dist
            displayName: 'Prepare deoployment directory'
          
          - script: |
              echo "Copying source code to vm location and running web app"
              rsync -av --delete \
                --exclude='.git' \
                --exclude='*.pyc' \
                --exclude='__pycache__' \
                --exclude='.venv' \
                --exclude='tests' \
                $(System.DefaultWorkingDirectory)/ /home/azureuser/dist/
            displayName: 'Copy source code to VM'

          - script: |
              echo "Installing dependencies on VM"
              cd /home/azureuser/dist
              python3 -m venv antenv
              source antenv/bin/activate
              pip3 install --upgrade pip
              pip3 install -r requirements.txt
            displayName: 'Install dependencies on VM'

          - script: |
              echo "writing systemd service file for web app"
              sudo bash -c 'cat > /etc/systemd/system/myflaskapp.service <<EOF
              [Unit]
              Description=My Flask App
              After=network.target

              [Service]
              User=azureuser
              WorkingDirectory=/home/azureuser/dist
              Environment="PYTHONPATH=/home/azureuser/dist"
              Environment="PATH=/home/azureuser/dist/antenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              Environment="VIRTUAL_ENV=/home/azureuser/dist/antenv"
              ExecStart=/home/azureuser/dist/antenv/bin/gunicorn app.lib.main:app --bind 0.0.0.0:8080 --access-logfile /home/azureuser/logs/myflaskapp_access.log --error-logfile /home/azureuser/logs/myflaskapp_error.log
              Restart=always

              [Install]
              WantedBy=multi-user.target
              EOF'
            displayName: 'Write systemd service file'
          
          - script: |
              echo "Reloading and resarting service..."
              sudo systemctl daemon-reload
              sudo systemctl enable myflaskapp
              sudo systemctl restart myflaskapp
              sleep 3
              sudo systemctl status myflaskapp
            displayName: 'Start/Resart Gunicorn service'
          
          - bash: |
              echo "Verifying app is running..."
              sleep 10
              sudo systemctl is-active myflaskapp
              ss -lntp | grep 8080
              echo "Checking running processes"
              ps aux | grep gunicorn

              echo "Performing health check on web app endpoint"
              for i in {1..20}; do
                if curl -s http://localhost:8080/ > /dev/null; then
                  echo "Web app is running"
                  exit 0
                else
                  echo "Web app not responding yet, retrying..."
                  sleep 3
                fi
              done

            displayName: 'Health Check'
            continueOnError: true
          